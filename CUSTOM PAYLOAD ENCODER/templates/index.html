<!DOCTYPE html>
<html>
<head>
    <title>Payload Encoder Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🔐 Custom Payload Encoder & Obfuscation Framework</h1>

    <form method="POST">
        <textarea name="payload" placeholder="Enter your payload here..." required></textarea>
        <button type="submit">Process Payload</button>
    </form>

    {% if encoded %}
    <div class="result">
        <h3>Encoded Payload:</h3>
        <p>{{ encoded }}</p>

        <h3>Obfuscated Payload:</h3>
        <p>{{ obfuscated }}</p>

        <h3>Decoded Payload:</h3>
        <p>{{ decoded }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
